<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurante - Inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        h1 {
            color: #f8d24e;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        p, .lead {
            color: #f8f9fa;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .cover-container {
            max-width: 960px;
        }

        main {
            flex: 1;
        }

        .btn-light {
            color: #000;
        }
    </style>
</head>

<body>
<div class="overlay"></div>

<div th:replace="fragments/header :: header"></div>
<div th:replace="~{fragments/menu :: menu}"></div>

<main class="container mt-5 cover-container text-center">
    <h1 class="mb-4 fw-bold" style="color: #f8d24e; text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);">
        Bienvenido al Sistema de Restaurante
    </h1>
    <p class="lead">Seleccione una opción del menú para comenzar.</p>
    <a th:href="@{/menu}" class="btn btn-light btn-lg mt-3">Ver Menú</a>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
