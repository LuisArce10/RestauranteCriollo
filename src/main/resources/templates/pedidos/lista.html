<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pedidos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            z-index: 1;
            position: relative;
            margin-top: 3rem;
        }

        table {
            background-color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>

<body>
<div class="overlay"></div>

<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold" style="color: #f8d24e; text-shadow: 2px 2px 5px rgba(0,0,0,0.7);">
            Pedidos
        </h2>
        <a th:href="@{/pedidos/nuevo}" class="btn btn-warning">Nuevo Pedido</a>
    </div>

    <table class="table table-striped table-bordered table-hover rounded overflow-hidden">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Mozo</th>
            <th>Mesa</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pedido : ${pedidos}">
            <td th:text="${pedido.id}"></td>
            <td th:text="${pedido.mozo.nombre}"></td>
            <td th:text="${pedido.mesa.numero}"></td>
            <td>
                <span th:if="${pedido.fecha != null}" th:text="${#temporals.format(pedido.fecha, 'yyyy-MM-dd HH:mm')}"></span>
                <span th:unless="${pedido.fecha != null}">Sin fecha</span>
            </td>
            <td th:text="${pedido.estado}"></td>
            <td>
                <a th:href="@{|/pedidos/editar/${pedido.id}|}" class="btn btn-sm btn-outline-primary me-1">Editar</a>
                <a th:href="@{|/pedidos/eliminar/${pedido.id}|}" class="btn btn-sm btn-outline-danger">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
